name: docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  pdoc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ".[docs]"
      - run: python -m pdoc -o html rse_units_moracz

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: html